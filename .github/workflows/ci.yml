name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint (Auto-fix)
      run: npm run lint -- --fix || true
      continue-on-error: true
      
    - name: Auto-commit Lint Fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto-fix linting issues"
        
    - name: Type Check
      run: npx tsc --noEmit
      continue-on-error: true
      
    - name: Build
      run: npm run build
      continue-on-error: true
